# Blueprint Render.com — Quantum MLB 24/7
# En Render: New > Blueprint > conecta tu repo con este archivo

services:
  - type: web
    name: quantum-mlb
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn servidor_mlb:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ODDS_API_KEY
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data
